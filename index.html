<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Leap | The Switcher's Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 sm:p-8">

    <div class="max-w-3xl w-full text-center">
        <div class="mb-4 inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/30 text-blue-400 text-sm font-bold uppercase tracking-widest">
            Linux Adoption Tool 2026
        </div>
        <h1 class="text-6xl font-black mb-4 tracking-tighter">Linux <span class="text-blue-500">Leap</span></h1>
        <p class="text-slate-400 text-lg mb-10">Stop guessing. Check your apps and games instantly.</p>

        <div class="glass p-2 rounded-2xl flex flex-col sm:flex-row items-center gap-2 mb-10 transition-all duration-300 focus-within:scale-[1.02]">
            <input id="search" type="text" placeholder="Type an app (e.g. Photoshop) or Game (e.g. Elden Ring)" 
                   class="bg-transparent w-full p-4 outline-none text-lg text-white"
                   onkeypress="if(event.key === 'Enter') checkApp()">
            <button onclick="checkApp()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-xl font-black text-white transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                CHECK
            </button>
        </div>

        <div id="result" class="hidden text-left space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
            </div>
    </div>

    <script>
        async function checkApp() {
        const query = document.getElementById('search').value.trim();
        const resultDiv = document.getElementById('result');
        if (!query) return;

        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = `<div class="text-center p-10 bg-slate-800/50 rounded-3xl border border-slate-700">
            <div class="animate-pulse text-blue-400 font-bold">Scanning Linux Databases...</div>
        </div>`;

        try {
            // We use 'allorigins' - it's a very reliable CORS proxy
            const proxy = "https://api.allorigins.win/get?url=";
            const target = `https://flathub.org/api/v1/apps/search/${encodeURIComponent(query)}`;
        
            const response = await fetch(proxy + encodeURIComponent(target));
            const data = await response.json();
        // AllOrigins wraps the result in a "contents" string, so we parse it
            const flatData = JSON.parse(data.contents);

            let html = "";

            if (flatData && flatData.length > 0) {
                const top = flatData[0];
                html += `
                <div class="glass p-6 rounded-3xl border-l-4 border-l-green-500 mb-4">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="bg-green-500 text-black text-[10px] font-black px-2 py-0.5 rounded">NATIVE FOUND</span>
                    </div>
                    <h2 class="text-3xl font-black">${top.name}</h2>
                    <p class="text-slate-400 mb-4">${top.summary || 'Available on Linux.'}</p>
                    <div class="flex flex-wrap gap-2">
                        <a href="https://flathub.org/apps/${top.flatpakAppId}" target="_blank" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-bold transition">View on Flathub</a>
                        <button onclick="navigator.clipboard.writeText('flatpak install flathub ${top.flatpakAppId}'); alert('Command Copied!')" class="bg-blue-600/20 text-blue-400 hover:bg-blue-600/40 px-4 py-2 rounded-lg text-sm font-bold border border-blue-500/30">Copy Install Command</button>
                    </div>
                </div>`;
            } else {
                html += `<div class="glass p-6 rounded-3xl border-l-4 border-l-slate-500 mb-4 text-center">
                    <h3 class="text-xl font-bold italic text-slate-400">No Direct Native Match Found</h3>
                </div>`;
            }

        // Add the Gaming & Alternatives buttons (Backups)
            html += `
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl border-t-4 border-t-indigo-500">
                    <span class="bg-indigo-500 text-white text-[10px] font-black px-2 py-0.5 rounded uppercase">Gaming</span>
                    <h3 class="text-lg font-bold mt-2 italic">ProtonDB</h3>
                    <a href="https://www.protondb.com/search?q=${encodeURIComponent(query)}" target="_blank" class="block mt-4 text-indigo-400 font-black text-sm">SEARCH STEAM RATINGS →</a>
                </div>
                <div class="glass p-6 rounded-3xl border-t-4 border-t-yellow-500">
                    <span class="bg-yellow-500 text-black text-[10px] font-black px-2 py-0.5 rounded uppercase">Alternatives</span>
                    <h3 class="text-lg font-bold mt-2 italic">Replacement</h3>
                    <a href="https://alternativeto.net/browse/search/?q=${encodeURIComponent(query)}&platform=linux" target="_blank" class="block mt-4 text-yellow-500 font-black text-sm">FIND ALTERNATIVES →</a>
                </div>
            </div>`;

            resultDiv.innerHTML = html;

        } catch (e) {
        // Ultimate fallback if even the proxy fails
            resultDiv.innerHTML = `<div class="glass p-6 rounded-3xl text-center border border-red-500/30">
                <p class="text-red-400 font-bold mb-4">Direct search failed. Use the global search buttons:</p>
                <div class="flex flex-col gap-2">
                    <a href="https://www.protondb.com/search?q=${encodeURIComponent(query)}" target="_blank" class="bg-indigo-600 p-3 rounded-xl font-bold">Search ProtonDB</a>
                    <a href="https://alternativeto.net/browse/search/?q=${encodeURIComponent(query)}&platform=linux" target="_blank" class="bg-yellow-600 p-3 rounded-xl font-bold text-black">Find Alternatives</a>
                </div>
            </div>`;
        }
    }
    </script>
</body>
</html>
